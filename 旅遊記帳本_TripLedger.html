<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>旅遊記帳本 • TripLedger</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&amp;family=Inter:wght@300;400;500;600&amp;display=swap');
        
        :root {
            --primary: #0ea5e9;
        }
        
        body {
            font-family: 'Inter', 'Noto Sans TC', system-ui, -apple-system, sans-serif;
        }
        
        .chinese {
            font-family: 'Noto Sans TC', 'Inter', system-ui, sans-serif;
        }

        .expense-card {
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .expense-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.05), 0 4px 6px -4px rgb(0 0 0 / 0.05);
        }

        .section-pill {
            transition: all 0.1s ease;
        }
        
        .section-pill.active {
            background-color: #0ea5e9;
            color: white;
            box-shadow: 0 1px 3px rgba(14, 165, 233, 0.3);
        }

        .modal {
            animation: modalPop 0.2s ease-out forwards;
        }

        @keyframes modalPop {
            from {
                opacity: 0;
                transform: scale(0.95) translateY(10px);
            }
            to {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }

        .nav-active {
            background-color: #f1f5f9;
            color: #0f172a;
            font-weight: 600;
        }

        .amount {
            font-variant-numeric: tabular-nums;
        }

        .receipt-preview {
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
            border: 1px solid #e2e8f0;
        }

        .trip-card {
            transition: all 0.2s ease;
        }
        
        .trip-card:hover {
            transform: translateX(4px);
            box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.1);
        }

        .category-badge {
            font-size: 0.75rem;
            padding: 0.1rem 0.5rem;
            border-radius: 9999px;
            font-weight: 500;
        }

        .ledger-bg {
            background: linear-gradient(to bottom, #f8fafc, #ffffff);
        }

        .notebook-shadow {
            box-shadow: 0 10px 10px -3px rgb(15 23 42 / 0.05), 
                       0 4px 6px -4px rgb(15 23 42 / 0.05);
        }

        .expense-row {
            transition: background-color 0.1s ease;
        }
        
        .expense-row:hover {
            background-color: #f8fafc;
        }

        .mini-avatar {
            width: 22px;
            height: 22px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 10px;
            font-weight: 600;
            color: white;
            border-radius: 9999px;
            border: 2px solid white;
        }

        .app-container {
            max-width: 1440px;
            margin: 0 auto;
        }

        .thin-scroll::-webkit-scrollbar {
            height: 4px;
            width: 4px;
        }
        
        .thin-scroll::-webkit-scrollbar-thumb {
            background-color: #cbd5e1;
            border-radius: 20px;
        }

        .ocr-loading {
            background: linear-gradient(90deg, #e0f2fe 25%, #bae6fd 50%, #e0f2fe 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
        }

        @keyframes shimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        .metric-number {
            font-variant-numeric: tabular-nums;
            font-feature-settings: "ss02";
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-800">
    <!-- Top Navigation -->
    <nav class="bg-white border-b border-slate-200 sticky top-0 z-50">
        <div class="max-w-screen-2xl mx-auto">
            <div class="px-6 py-3 flex items-center justify-between">
                <div class="flex items-center gap-x-3">
                    <!-- Logo -->
                    <div class="flex items-center gap-x-2.5">
                        <div class="w-10 h-10 bg-sky-500 rounded-2xl flex items-center justify-center shadow-inner">
                            <i class="fa-solid fa-plane text-white text-2xl"></i>
                        </div>
                        <div>
                            <span class="font-bold text-2xl tracking-tighter">TripLedger</span>
                            <span class="text-xs text-slate-400 block -mt-1">旅遊記帳本</span>
                        </div>
                    </div>
                    
                    <!-- Breadcrumb / Current Trip -->
                    <div id="nav-breadcrumb" class="hidden items-center gap-x-2 pl-4 border-l border-slate-200 ml-2">
                        <div class="flex items-center gap-x-2 text-sm">
                            <button onclick="goToTripsList()" 
                                    class="flex items-center gap-x-1.5 px-3 py-1.5 text-slate-500 hover:text-slate-700 hover:bg-slate-100 rounded-xl text-sm font-medium transition-colors">
                                <i class="fa-solid fa-book mr-1.5"></i>
                                <span>所有旅程</span>
                            </button>
                            <i class="fa-solid fa-chevron-right text-slate-300 text-xs"></i>
                            <div id="nav-trip-name" class="font-semibold text-slate-700 max-w-[220px] truncate"></div>
                        </div>
                    </div>
                </div>

                <!-- Right side controls -->
                <div class="flex items-center gap-x-3">
                    <!-- Global Search -->
                    <div class="relative w-72 hidden md:block">
                        <input type="text" id="global-search" 
                               class="w-full bg-slate-100 border border-slate-200 focus:border-sky-300 focus:bg-white transition-colors pl-10 py-2 text-sm rounded-2xl outline-none"
                               placeholder="搜尋所有記錄... (開發中)">
                        <i class="fa-solid fa-search absolute left-4 top-3 text-slate-400 text-sm"></i>
                    </div>

                    <!-- User Switcher -->
                    <div class="relative" id="user-switcher">
                        <button onclick="showUserMenu()" 
                                class="flex items-center gap-x-2.5 pl-2 pr-4 py-1.5 bg-white hover:bg-slate-50 border border-slate-200 rounded-3xl text-sm transition-all active:scale-[0.985]">
                            <div id="current-user-avatar" 
                                 class="w-7 h-7 rounded-2xl bg-sky-500 flex items-center justify-center text-white text-xs font-bold shadow-sm">
                            </div>
                            <div class="flex flex-col items-start -space-y-0.5">
                                <span id="current-user-name" class="font-semibold text-sm leading-none"></span>
                            </div>
                            <i class="fa-solid fa-chevron-down text-slate-400 text-xs ml-0.5"></i>
                        </button>
                    </div>

                    <!-- More Menu -->
                    <div class="relative">
                        <button onclick="showMoreMenu(event)" 
                                class="w-9 h-9 flex items-center justify-center text-slate-500 hover:text-slate-700 hover:bg-slate-100 rounded-2xl transition-colors">
                            <i class="fa-solid fa-ellipsis-h text-lg"></i>
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <div class="max-w-screen-2xl mx-auto flex">
        <!-- Sidebar: Trips List -->
        <div class="w-72 bg-white border-r border-slate-200 h-[calc(100vh-57px)] overflow-y-auto thin-scroll flex-shrink-0">
            <div class="p-4">
                <!-- New Trip Button -->
                <button onclick="showNewTripModal()"
                        class="w-full flex items-center justify-center gap-x-2 bg-sky-500 hover:bg-sky-600 active:bg-sky-700 transition-all text-white font-semibold py-3 rounded-2xl shadow-sm text-sm mb-4">
                    <i class="fa-solid fa-plus mr-1"></i>
                    <span>新增旅程</span>
                </button>

                <!-- Trips Header -->
                <div class="flex items-center justify-between px-1 mb-2">
                    <div class="text-xs font-bold tracking-widest text-slate-400">我的旅程</div>
                    <div id="trips-count" class="text-[10px] px-2 py-px bg-slate-100 text-slate-500 rounded-full font-mono"></div>
                </div>

                <!-- Trips List -->
                <div id="trips-list" class="space-y-1 pr-1">
                    <!-- Populated by JS -->
                </div>

                <div class="mt-6 px-1">
                    <button onclick="loadDemoData()" 
                            class="text-xs flex items-center gap-x-1.5 text-slate-400 hover:text-sky-600 transition-colors">
                        <i class="fa-solid fa-magic text-xs"></i>
                        <span>載入示例數據</span>
                    </button>
                </div>
            </div>
        </div>

        <!-- Main Content Area -->
        <div class="flex-1 min-w-0 h-[calc(100vh-57px)] overflow-y-auto" id="main-content">
            <!-- Dynamic content injected by JS -->
        </div>
    </div>

    <!-- Add/Edit Expense Modal -->
    <div id="expense-modal" class="hidden fixed inset-0 bg-black/60 backdrop-blur-sm z-[100] flex items-center justify-center p-4">
        <div class="bg-white rounded-3xl w-full max-w-[620px] shadow-2xl overflow-hidden modal">
            <!-- Modal Header -->
            <div class="px-6 pt-5 pb-4 border-b flex items-center justify-between bg-slate-50">
                <div>
                    <h3 id="modal-title" class="font-bold text-xl">新增支出</h3>
                    <p id="modal-subtitle" class="text-xs text-slate-500 mt-0.5">上傳收據照片自動識別金額與店舖</p>
                </div>
                <button onclick="closeExpenseModal()" class="w-9 h-9 flex items-center justify-center text-slate-400 hover:text-slate-600 hover:bg-slate-200 rounded-2xl transition-colors">
                    <i class="fa-solid fa-times text-xl"></i>
                </button>
            </div>

            <div class="p-6 space-y-5 max-h-[78vh] overflow-y-auto thin-scroll">
                <!-- Photo Upload Section -->
                <div>
                    <label class="block text-xs font-semibold text-slate-500 mb-1.5 tracking-wider">收據照片 / 發票</label>
                    
                    <div id="photo-upload-area" 
                         class="border-2 border-dashed border-slate-200 hover:border-sky-300 transition-colors rounded-2xl p-4 text-center cursor-pointer bg-slate-50"
                         onclick="document.getElementById('photo-input').click()">
                        
                        <div id="photo-preview-container" class="hidden">
                            <div class="relative inline-block">
                                <img id="photo-preview" class="max-h-[160px] rounded-xl shadow-sm mx-auto receipt-preview">
                                <button onclick="event.stopImmediatePropagation(); removePhoto()" 
                                        class="absolute -top-1.5 -right-1.5 w-6 h-6 bg-red-500 text-white rounded-full flex items-center justify-center shadow text-xs">
                                    <i class="fa-solid fa-times"></i>
                                </button>
                            </div>
                            <div class="mt-2 flex justify-center gap-x-2">
                                <button onclick="event.stopImmediatePropagation(); reRunOCR()" 
                                        class="text-xs flex items-center gap-x-1.5 px-3 py-1 bg-white border border-slate-200 hover:bg-slate-50 rounded-xl text-sky-600 font-medium">
                                    <i class="fa-solid fa-sync-alt text-xs"></i>
                                    <span>重新識別</span>
                                </button>
                            </div>
                        </div>
                        
                        <div id="photo-placeholder">
                            <div class="mx-auto w-11 h-11 bg-white rounded-2xl flex items-center justify-center border border-slate-200 mb-3 shadow-inner">
                                <i class="fa-solid fa-camera text-2xl text-slate-300"></i>
                            </div>
                            <div class="text-sm font-medium text-slate-600">上傳收據照片</div>
                            <div class="text-[10px] text-slate-400 mt-0.5">支援 JPG / PNG • 點擊或拖放</div>
                            
                            <div class="flex justify-center gap-x-2 mt-3">
                                <div class="px-3 py-1 bg-white text-[10px] border border-slate-200 rounded-xl flex items-center gap-x-1 text-slate-500">
                                    <i class="fa-solid fa-image text-xs"></i>
                                    <span class="text-[10px]">相簿</span>
                                </div>
                                <div onclick="event.stopImmediatePropagation(); triggerCamera()" 
                                     class="px-3 py-1 bg-white text-[10px] border border-slate-200 rounded-xl flex items-center gap-x-1 text-slate-500 cursor-pointer active:bg-sky-50">
                                    <i class="fa-solid fa-camera text-xs"></i>
                                    <span class="text-[10px]">拍照</span>
                                </div>
                            </div>
                        </div>
                    </div>
                    
                    <input type="file" id="photo-input" accept="image/*" class="hidden" onchange="handlePhotoUpload(event)">
                    <input type="file" id="camera-input" accept="image/*" capture="environment" class="hidden" onchange="handlePhotoUpload(event)">
                </div>

                <!-- OCR Result -->
                <div id="ocr-result-box" class="hidden bg-emerald-50 border border-emerald-100 rounded-2xl p-3 text-sm">
                    <div class="flex items-center gap-x-2 text-emerald-700 mb-1">
                        <i class="fa-solid fa-magic"></i>
                        <span class="font-semibold text-xs tracking-wider">自動識別結果</span>
                        <span id="ocr-confidence" class="ml-auto text-[10px] font-mono bg-white px-1.5 rounded"></span>
                    </div>
                    <div id="ocr-parsed" class="text-emerald-800 text-sm font-medium"></div>
                </div>

                <!-- Form Fields -->
                <div class="grid grid-cols-2 gap-x-4 gap-y-4">
                    <!-- Date -->
                    <div>
                        <label class="text-xs font-semibold text-slate-500 block mb-1">日期</label>
                        <input type="date" id="expense-date" 
                               class="w-full border border-slate-200 focus:border-sky-400 transition-colors rounded-2xl px-4 py-2.5 text-sm outline-none">
                    </div>
                    
                    <!-- Time -->
                    <div>
                        <label class="text-xs font-semibold text-slate-500 block mb-1">時間 <span class="text-slate-300">(選填)</span></label>
                        <input type="time" id="expense-time" 
                               class="w-full border border-slate-200 focus:border-sky-400 transition-colors rounded-2xl px-4 py-2.5 text-sm outline-none">
                    </div>

                    <!-- Place / Location -->
                    <div class="col-span-2 md:col-span-1">
                        <label class="text-xs font-semibold text-slate-500 block mb-1">地點 / 區域</label>
                        <input type="text" id="expense-place" placeholder="例如：澀谷、京都車站、迪士尼"
                               class="w-full border border-slate-200 focus:border-sky-400 transition-colors rounded-2xl px-4 py-2.5 text-sm outline-none">
                    </div>

                    <!-- Merchant -->
                    <div class="col-span-2 md:col-span-1">
                        <label class="text-xs font-semibold text-slate-500 block mb-1">店舖 / 商戶名稱</label>
                        <input type="text" id="expense-merchant" placeholder="自動填入或手動輸入"
                               class="w-full border border-slate-200 focus:border-sky-400 transition-colors rounded-2xl px-4 py-2.5 text-sm outline-none">
                    </div>

                    <!-- Amount + Currency -->
                    <div class="col-span-2 md:col-span-1">
                        <label class="text-xs font-semibold text-slate-500 block mb-1">金額</label>
                        <div class="flex">
                            <input type="number" id="expense-amount" step="0.01" placeholder="0.00"
                                   class="flex-1 border border-slate-200 focus:border-sky-400 transition-colors rounded-l-2xl px-4 py-2.5 text-lg font-semibold outline-none">
                            <select id="expense-currency" 
                                    class="border border-l-0 border-slate-200 focus:border-sky-400 transition-colors rounded-r-2xl px-3 text-sm bg-white font-medium">
                                <option value="HKD">HKD</option>
                                <option value="JPY">JPY</option>
                                <option value="CNY">CNY</option>
                                <option value="USD">USD</option>
                                <option value="EUR">EUR</option>
                                <option value="TWD">TWD</option>
                                <option value="KRW">KRW</option>
                                <option value="SGD">SGD</option>
                                <option value="THB">THB</option>
                            </select>
                        </div>
                    </div>

                    <!-- Section (Place in trip) -->
                    <div class="col-span-2 md:col-span-1">
                        <label class="text-xs font-semibold text-slate-500 block mb-1">所屬日程 / 地點</label>
                        <select id="expense-section" 
                                class="w-full border border-slate-200 focus:border-sky-400 transition-colors rounded-2xl px-4 py-2.5 text-sm outline-none bg-white">
                            <!-- Populated dynamically -->
                        </select>
                    </div>

                    <!-- Category -->
                    <div>
                        <label class="text-xs font-semibold text-slate-500 block mb-1">分類</label>
                        <select id="expense-category" 
                                class="w-full border border-slate-200 focus:border-sky-400 transition-colors rounded-2xl px-4 py-2.5 text-sm outline-none bg-white">
                            <!-- Populated by JS -->
                        </select>
                    </div>

                    <!-- Payment Method -->
                    <div>
                        <label class="text-xs font-semibold text-slate-500 block mb-1">付款方式</label>
                        <select id="expense-payment" 
                                class="w-full border border-slate-200 focus:border-sky-400 transition-colors rounded-2xl px-4 py-2.5 text-sm outline-none bg-white">
                            <!-- Populated by JS -->
                        </select>
                    </div>
                </div>

                <!-- Tags -->
                <div>
                    <label class="text-xs font-semibold text-slate-500 block mb-1.5">標籤 <span class="text-slate-300">(可多個)</span></label>
                    <div class="flex flex-wrap gap-1.5 mb-2" id="tags-container">
                        <!-- Tags chips added here -->
                    </div>
                    <div class="flex gap-x-2">
                        <input type="text" id="tag-input" placeholder="輸入標籤後按 Enter" 
                               class="flex-1 text-sm border border-slate-200 focus:border-sky-300 rounded-2xl px-4 py-2 outline-none"
                               onkeypress="if (event.key === 'Enter') addTag()">
                        <button onclick="addTag()" 
                                class="px-4 text-sm font-medium bg-slate-100 hover:bg-slate-200 active:bg-slate-300 transition-colors rounded-2xl">新增</button>
                    </div>
                    <div class="flex flex-wrap gap-1 mt-2" id="suggested-tags">
                        <!-- Quick suggestion chips -->
                    </div>
                </div>

                <!-- Notes -->
                <div>
                    <label class="text-xs font-semibold text-slate-500 block mb-1">備註 / 心得</label>
                    <textarea id="expense-notes" rows="2" placeholder="例如：超好食！推薦必點牛丼"
                              class="w-full border border-slate-200 focus:border-sky-400 transition-colors rounded-2xl px-4 py-2.5 text-sm outline-none resize-y"></textarea>
                </div>

                <!-- Added by -->
                <div class="flex items-center justify-between text-xs pt-1">
                    <div class="flex items-center gap-x-2 text-slate-500">
                        <span>記錄人</span>
                        <div id="modal-added-by" class="font-semibold text-slate-700 flex items-center gap-x-1.5"></div>
                    </div>
                    <button onclick="changeAddedByInModal()" class="text-sky-600 hover:underline text-xs">更改</button>
                </div>
            </div>

            <!-- Modal Footer -->
            <div class="px-6 py-4 bg-slate-50 border-t flex items-center justify-end gap-x-3">
                <button onclick="closeExpenseModal()" 
                        class="px-5 py-2.5 text-sm font-medium text-slate-600 hover:bg-slate-200 transition-colors rounded-2xl">取消</button>
                <button id="save-expense-btn" onclick="saveExpenseFromModal()"
                        class="px-8 py-2.5 bg-sky-500 hover:bg-sky-600 active:bg-sky-700 transition-all text-white font-semibold rounded-2xl text-sm flex items-center gap-x-2 shadow-sm">
                    <i class="fa-solid fa-save mr-1"></i>
                    <span id="save-btn-text">儲存支出</span>
                </button>
            </div>
        </div>
    </div>

    <!-- New Trip Modal -->
    <div id="new-trip-modal" class="hidden fixed inset-0 bg-black/60 backdrop-blur-sm z-[100] flex items-center justify-center p-4">
        <div class="bg-white rounded-3xl w-full max-w-md shadow-2xl modal overflow-hidden">
            <div class="px-6 pt-5 pb-4 border-b">
                <h3 class="font-bold text-xl">建立新旅程</h3>
                <p class="text-xs text-slate-500 mt-0.5">像筆記簿一樣分層管理不同地方的開支</p>
            </div>
            
            <div class="p-6 space-y-4">
                <div>
                    <label class="text-xs font-semibold text-slate-500">旅程名稱</label>
                    <input type="text" id="new-trip-name" placeholder="例如：日本京都・大阪 6日遊 2026" 
                           class="mt-1 w-full border border-slate-200 focus:border-sky-400 rounded-2xl px-4 py-2.5 text-sm outline-none">
                </div>
                
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="text-xs font-semibold text-slate-500">開始日期</label>
                        <input type="date" id="new-trip-start" class="mt-1 w-full border border-slate-200 focus:border-sky-400 rounded-2xl px-4 py-2.5 text-sm outline-none">
                    </div>
                    <div>
                        <label class="text-xs font-semibold text-slate-500">結束日期</label>
                        <input type="date" id="new-trip-end" class="mt-1 w-full border border-slate-200 focus:border-sky-400 rounded-2xl px-4 py-2.5 text-sm outline-none">
                    </div>
                </div>
                
                <div>
                    <label class="text-xs font-semibold text-slate-500">參與者（多人使用）</label>
                    <input type="text" id="new-trip-participants" placeholder="你, 伴侶, 朋友A（用逗號分隔）" 
                           class="mt-1 w-full border border-slate-200 focus:border-sky-400 rounded-2xl px-4 py-2.5 text-sm outline-none">
                    <div class="text-[10px] text-slate-400 mt-1">之後可隨時新增或修改</div>
                </div>
                
                <div>
                    <label class="text-xs font-semibold text-slate-500">描述 / 備註（選填）</label>
                    <textarea id="new-trip-desc" rows="2" placeholder="第一次去日本，重點是美食同購物"
                              class="mt-1 w-full border border-slate-200 focus:border-sky-400 rounded-2xl px-4 py-2 text-sm outline-none"></textarea>
                </div>
            </div>
            
            <div class="px-6 py-4 bg-slate-50 border-t flex justify-end gap-x-3">
                <button onclick="closeNewTripModal()" class="px-5 py-2 text-sm font-medium text-slate-600 hover:bg-slate-100 rounded-2xl transition-colors">取消</button>
                <button onclick="createNewTrip()" class="px-6 py-2 bg-sky-500 text-white font-semibold rounded-2xl text-sm hover:bg-sky-600 transition-all">建立旅程</button>
            </div>
        </div>
    </div>

    <!-- Toast Container -->
    <div id="toast-container" class="fixed bottom-5 right-5 z-[200] space-y-2"></div>

    <script>
        // ==================== DATA MODEL & STATE ====================
        let appData = {
            version: 1,
            users: ["你", "伴侶", "朋友"],
            currentUser: "你",
            trips: []
        };

        let currentTripId = null;
        let currentExpenseId = null; // for editing

        // ==================== UTILITY FUNCTIONS ====================
        function generateId() {
            return Date.now().toString(36) + Math.random().toString(36).substr(2, 5);

        function formatDate(dateStr) {
            if (!dateStr) return '';
            const d = new Date(dateStr);
            return d.toLocaleDateString('zh-HK', { month: 'numeric', day: 'numeric' });
        }

        function formatFullDate(dateStr) {
            if (!dateStr) return '';
            const d = new Date(dateStr);
            return d.toLocaleDateString('zh-HK', { year: 'numeric', month: 'long', day: 'numeric' });
        }

        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function showToast(message, type = 'success') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            
            let bg = 'bg-emerald-500';
            let icon = 'fa-check-circle';
            
            if (type === 'error') {
                bg = 'bg-red-500';
                icon = 'fa-exclamation-circle';
            } else if (type === 'info') {
                bg = 'bg-sky-500';
                icon = 'fa-info-circle';
            }
            
            toast.className = `flex items-center gap-x-3 ${bg} text-white px-5 py-3 rounded-2xl shadow-lg text-sm max-w-xs`;
            toast.innerHTML = `
                <i class="fa-solid ${icon} text-lg"></i>
                <span>${message}</span>
            `;
            
            container.appendChild(toast);
            
            setTimeout(() => {
                toast.style.transition = 'all 0.3s ease';
                toast.style.opacity = '0';
                setTimeout(() => toast.remove(), 200);
            }, 2800);
        }

        function saveData() {
            try {
                localStorage.setItem('tripLedgerData', JSON.stringify(appData));
            } catch (e) {
                console.error('Failed to save data', e);
                showToast('儲存失敗，可能是儲存空間不足', 'error');
            }
        }

        function loadData() {
            const saved = localStorage.getItem('tripLedgerData');
            if (saved) {
                try {
                    const parsed = JSON.parse(saved);
                    if (parsed.version && parsed.trips) {
                        appData = parsed;
                        // Ensure currentUser exists
                        if (!appData.users.includes(appData.currentUser)) {
                            appData.currentUser = appData.users[0] || "你";
                        }
                    }
                } catch (e) {
                    console.error('Corrupted data, resetting', e);
                }
            }
        }

        function getCurrentTrip() {
            return appData.trips.find(t => t.id === currentTripId);
        }

        function calculateTripTotal(trip) {
            if (!trip || !trip.expenses) return 0;
            return trip.expenses.reduce((sum, exp) => {
                // Simple conversion for demo (in real would use exchange rates)
                let amount = exp.amount || 0;
                if (exp.currency === 'JPY') amount = amount / 18; // rough
                if (exp.currency === 'USD') amount = amount * 7.8;
                if (exp.currency === 'EUR') amount = amount * 8.4;
                return sum + amount;
            }, 0);
        }

        async function runOCR(imageDataUrl) {
            const ocrBox = document.getElementById('ocr-result-box');
            const parsedEl = document.getElementById('ocr-parsed');
            const confEl = document.getElementById('ocr-confidence');
            
            ocrBox.classList.remove('hidden');
            ocrBox.classList.add('ocr-loading');
            parsedEl.innerHTML = `<span class="text-emerald-600">正在識別收據內容...</span>`;
            confEl.textContent = '';
            
            try {
                // Resize image for better OCR performance
                const resizedDataUrl = await resizeImageForOCR(imageDataUrl, 900);
                
                const worker = await Tesseract.createWorker('eng'); // Change to 'eng+chi_tra' for better Chinese support (slower first load)
                
                const { data } = await worker.recognize(resizedDataUrl);
                await worker.terminate();
                
                const parsed = parseReceiptText(data.text);
                
                ocrBox.classList.remove('ocr-loading');
                
                let resultHTML = '';
                if (parsed.amount) {
                    resultHTML += `<span class="font-mono text-lg">HK$${parsed.amount}</span>`;
                    // Auto fill amount
                    document.getElementById('expense-amount').value = parsed.amount;
                }
                
                if (parsed.merchant) {
                    if (resultHTML) resultHTML += ' • ';
                    resultHTML += `<span>${escapeHtml(parsed.merchant)}</span>`;
                    document.getElementById('expense-merchant').value = parsed.merchant;
                }
                
                if (!resultHTML) {
                    resultHTML = `<span class="text-emerald-600">已提取文字，可手動填寫</span>`;
                }
                
                parsedEl.innerHTML = resultHTML;
                confEl.textContent = `信心 ${Math.round(data.confidence)}%`;
                
                // Store raw for debugging
                window.lastOCRText = data.text;
                
                showToast('自動識別完成，請檢查並調整資料');
                
            } catch (err) {
                console.error('OCR Error:', err);
                ocrBox.classList.remove('ocr-loading');
                parsedEl.innerHTML = `<span class="text-red-500">識別失敗，請手動輸入金額與店舖名稱</span>`;
                showToast('OCR 識別失敗', 'error');
            }
        }

        function reRunOCR() {
            const preview = document.getElementById('photo-preview');
            if (preview && preview.src) {

            }
        }

        async function resizeImageForOCR(dataUrl, maxWidth = 900) {
            return new Promise((resolve) => {
                const img = new Image();
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    let width = img.width;
                    let height = img.height;
                    
                    if (width > maxWidth) {
                        height = Math.round(height * (maxWidth / width));
                        width = maxWidth;
                    }
                    
                    canvas.width = width;
                    canvas.height = height;
                    
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, width, height);
                    
                    // Use JPEG for smaller size
                    resolve(canvas.toDataURL('image/jpeg', 0.85));
                };
                img.src = dataUrl;
            });
        }

        function parseReceiptText(text) {
            if (!text) return { amount: null, merchant: '' };
            
            const lines = text.split('\n').map(l => l.trim()).filter(l => l.length > 1);
            
            let amount = null;
            let merchant = lines[0] || '';
            
            // Amount patterns (support Chinese and symbols)
            const amountPatterns = [
                /(?:合計|總計|Total|小計|金額|應收|找零)?\s*[:：]?\s*([¥$€£]?\s*[\d,]+(?:\.\d{1,2})?)\s*(?:元|円|円|HKD|JPY|USD|円)?/i,
                /([\d,]+\.\d{2})\s*(?:円|元|円|HKD)?/,
                /[¥$]\s*([\d,]+\.?\d*)/,
                /Total\s*[:：]?\s*([0-9.,]+)/i
            ];
            
            // Search from bottom (totals usually at end)
            for (let i = lines.length - 1; i >= 0; i--) {
                const line = lines[i];
                for (const pattern of amountPatterns) {
                    const match = line.match(pattern);
                    if (match) {
                        let numStr = match[1].replace(/[^\d.]/g, '');
                        const num = parseFloat(numStr);
                        if (num > 0 && num < 100000) { // reasonable range
                            amount = num;
                            break;
                        }
                    }
                }
                if (amount) break;
            }
            
            // Clean merchant name
            if (merchant.length > 30) merchant = merchant.substring(0, 30);
            if (/^\d{2,4}[\/\-]\d/.test(merchant) || /TEL/i.test(merchant) || /電話/i.test(merchant)) {
                merchant = lines[1] || lines[2] || merchant;
            }
            
            return { amount, merchant: merchant.trim() };
        }

            const url = URL.createObjectURL(blob);
            
            const a = document.createElement('a');

            a.download = `${trip.name.replace(/\s+/g, '_')}_記帳.json`;

                </div>
                <div class="h-px bg-slate-100 my-1"></div>
                <div onclick="clearAllData()" class="px-4 py-2.5 hover:bg-red-50 cursor-pointer flex items-center gap-x-3 text-red-600">
                    <i class="fa-solid fa-trash w-4"></i>
                    <span>清除所有數據</span>
                </div>
            `;
            
            // Position
            const rect = e.currentTarget.getBoundingClientRect();
            menu.style.top = `${rect.bottom + 4}px`;
            menu.style.right = `20px`;
            
            document.body.appendChild(menu);
            
            const close = () => {
                menu.remove();
                document.removeEventListener('click', close, true);
            };
            
            setTimeout(() => {
                document.addEventListener('click', close, { once: true, capture: true });
            }, 10);
        }

        function exportAllData() {
            const dataStr = JSON.stringify(appData, null, 2);
            const blob = new Blob([dataStr], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            
            const a = document.createElement('a');
            a.href = url;
            a.download = `TripLedger_全部數據_${new Date().toISOString().slice(0,10)}.json`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }

        function importData() {
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = '.json';
            
            input.onchange = function(e) {
                const file = e.target.files[0];
                if (!file) return;
                
                const reader = new FileReader();
                reader.onload = function(ev) {
                    try {
                        const imported = JSON.parse(ev.target.result);
                        
                        if (imported.trips && Array.isArray(imported.trips)) {
                            // Full data import
                            if (confirm('這將覆蓋現有所有數據，確定繼續？')) {
                                appData = imported;
                                saveData();
                                currentTripId = null;
                                renderTripsList();
                                renderMainContent();
                                showToast('數據已成功匯入');
                            }
                        } else if (imported.id && imported.expenses) {
                            // Single trip import
                            const exists = appData.trips.findIndex(t => t.id === imported.id);
                            if (exists !== -1) {
                                if (confirm('已存在相同旅程，是否覆蓋？')) {
                                    appData.trips[exists] = imported;
                                } else {
                                    imported.id = generateId();
                                    imported.name = imported.name + ' (副本)';
                                    appData.trips.push(imported);
                                }
                            } else {
                                appData.trips.push(imported);
                            }
                            saveData();
                            renderTripsList();
                            showToast('旅程數據已匯入');
                        } else {
                            showToast('無法識別的數據格式', 'error');
                        }
                    } catch (err) {
                        showToast('匯入失敗，文件損壞', 'error');
                    }
                };
                reader.readAsText(file);
            };
            
            input.click();
        }

        function clearAllData() {
            if (!confirm('確定要清除所有旅程和記錄嗎？此操作無法復原！')) return;
            
            appData.trips = [];
            saveData();
            currentTripId = null;
            renderTripsList();
            renderMainContent();
            showToast('所有數據已清除');
        }

        // ==================== USER MANAGEMENT ====================
        function showUserMenu() {
            const container = document.getElementById('user-switcher');
            
            const menu = document.createElement('div');
            menu.className = `absolute right-0 mt-2 w-48 bg-white border border-slate-200 shadow-xl rounded-2xl py-1 z-[150] text-sm`;
            
            let html = '';
            appData.users.forEach(user => {
                const isCurrent = user === appData.currentUser;
                html += `
                    <div onclick="switchUser('${user}', this)" class="px-4 py-[9px] flex items-center gap-x-3 cursor-pointer ${isCurrent ? 'bg-sky-50 text-sky-700' : 'hover:bg-slate-50'}">
                        <div class="w-6 h-6 rounded-xl ${isCurrent ? 'bg-sky-500' : 'bg-slate-300'} flex items-center justify-center text-white text-xs font-bold flex-shrink-0">${user.charAt(0)}</div>
                        <span class="flex-1">${escapeHtml(user)}</span>
                        ${isCurrent ? '<i class="fa-solid fa-check text-sky-500"></i>' : ''}
                    </div>
                `;
            });
            
            html += `
                <div class="h-px bg-slate-100 my-1"></div>
                <div onclick="addNewUser()" class="px-4 py-2 flex items-center gap-x-3 cursor-pointer hover:bg-slate-50 text-sky-600">
                    <i class="fa-solid fa-user-plus w-4"></i>
                    <span>新增用戶</span>
                </div>
            `;
            
            menu.innerHTML = html;
            container.appendChild(menu);
            
            const close = (e) => {
                if (!container.contains(e.target)) {
                    menu.remove();
                    document.removeEventListener('click', close, true);
                }
            };
            
            setTimeout(() => document.addEventListener('click', close, { capture: true, once: true }), 50);
        }

        function switchUser(username, el) {
            appData.currentUser = username;
            saveData();
            
            // Update UI
            updateCurrentUserUI();
            
            // Close menu
            const menu = el.closest('.absolute');
            if (menu) menu.remove();
            
            // If in expense modal, update
            const addedBy = document.getElementById('modal-added-by');
            if (addedBy && addedBy.dataset) {
                updateAddedByDisplay();
            }
            
            showToast(`已切換至 ${username}`);
        }

        function addNewUser() {
            // Close any open menu first
            document.querySelectorAll('.absolute').forEach(el => el.remove());
            
            const name = prompt('輸入新用戶名稱：');
            if (!name || !name.trim()) return;
            
            if (appData.users.includes(name.trim())) {
                showToast('用戶已存在', 'error');
                return;
            }
            
            appData.users.push(name.trim());
            saveData();
            updateCurrentUserUI();
            showToast('新用戶已新增');
        }

        function updateCurrentUserUI() {
            const avatar = document.getElementById('current-user-avatar');
            const nameEl = document.getElementById('current-user-name');
            
            avatar.innerHTML = appData.currentUser.charAt(0);
            nameEl.textContent = appData.currentUser;
        }

        // ==================== INITIALIZATION ====================
        function initializeApp() {
            loadData();
            
            // Ensure at least one user
            if (!appData.users || appData.users.length === 0) {
                appData.users = ["你", "伴侶"];
            }
            if (!appData.currentUser || !appData.users.includes(appData.currentUser)) {
                appData.currentUser = appData.users[0];
            }
            
            // Render initial UI
            updateCurrentUserUI();
            renderTripsList();
            
            // Show welcome or last trip
            const main = document.getElementById('main-content');
            if (appData.trips.length > 0) {
                // Optionally auto select first trip
                // currentTripId = appData.trips[0].id;
                renderWelcomeScreen(main);
            } else {
                renderWelcomeScreen(main);
            }
            
            // Keyboard shortcuts
            document.addEventListener('keydown', function(e) {
                if (e.metaKey && e.key === "/") {
                    e.preventDefault();
                    const search = document.getElementById('expense-search');
                    if (search) search.focus();
                    else document.getElementById('global-search').focus();
                }
                
                if (e.key === "Escape") {
                    const modals = document.querySelectorAll('.fixed.inset-0:not(.hidden)');
                    if (modals.length > 0) {
                        modals[modals.length - 1].classList.add('hidden');
                        modals[modals.length - 1].classList.remove('flex');
                    }
                }
            });
            
            // Demo hint if first time
            if (appData.trips.length === 0) {
                setTimeout(() => {
                    const hint = document.createElement('div');
                    hint.className = 'fixed bottom-6 left-1/2 -translate-x-1/2 bg-white border shadow px-4 py-2 rounded-3xl text-xs flex items-center gap-x-2 text-slate-500';
                    hint.innerHTML = `提示：點擊「載入示例數據」快速體驗功能`;
                    document.body.appendChild(hint);
                    
                    setTimeout(() => {
                        hint.style.transition = 'opacity .4s';
                        hint.style.opacity = '0';
                        setTimeout(() => hint.remove(), 400);
                    }, 4200);
                }, 5200);
            }
            
            console.log('%c[ TripLedger ] 旅遊記帳本 initialized', 'color:#64748b');
        }
