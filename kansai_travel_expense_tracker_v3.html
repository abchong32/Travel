<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>✈️ 日本關西之旅 2026 記帳本</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        body { 
            background-color: #f4f4f5; 
            font-family: 'PingFang HK', 'Noto Sans TC', 'Microsoft JhengHei', sans-serif; 
        }
        .notebook-page {
            background-color: #ffffff;
            background-image: linear-gradient(#e5e7eb 1px, transparent 1px);
            background-size: 100% 2.5rem;
            min-height: 100vh;
        }
        .expense-card { transition: all 0.2s ease; }
        .expense-card:hover {
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
            transform: translateY(-1px);
        }
        .day-tab { transition: all 0.2s ease; white-space: nowrap; }
        .summary-bar { background: linear-gradient(to right, #f8fafc, #ffffff); }
        .note-text { 
            display: -webkit-box; 
            -webkit-line-clamp: 2; 
            -webkit-box-orient: vertical; 
            overflow: hidden; 
        }
        .stat-row { transition: background-color 0.1s; }
        .stat-row:hover { background-color: #f8fafc; }
    </style>
</head>
<body class="flex justify-center bg-gray-200">

    <div class="w-full max-w-md notebook-page shadow-xl relative pb-20">
        
        <!-- Header -->
        <header class="bg-blue-600 text-white p-4 sticky top-0 z-10 shadow-md">
            <div class="flex justify-between items-center">
                <div>
                    <h1 class="text-xl font-bold flex items-center gap-x-2">
                        <span>✈️ 日本關西之旅 2026</span>
                    </h1>
                    <p class="text-blue-200 text-xs mt-0.5">大阪・京都・宇治</p>
                </div>
                <div class="flex items-center gap-x-1">
                    <!-- 統計按鈕 -->
                    <button onclick="openStatsModal()" 
                            class="text-xs bg-white/20 hover:bg-white/30 active:bg-white/40 px-3 py-1.5 rounded-lg font-medium transition flex items-center gap-x-1">
                        <span>📊</span>
                        <span class="hidden sm:inline">統計</span>
                    </button>
                    <!-- 設定按鈕 -->
                    <button onclick="openSettingsModal()" 
                            class="text-xs bg-white/20 hover:bg-white/30 active:bg-white/40 px-3 py-1.5 rounded-lg font-medium transition flex items-center gap-x-1">
                        <span>⚙️</span>
                    </button>
                </div>
            </div>
        </header>

        <!-- Day Tabs (可捲動) -->
        <div class="flex overflow-x-auto no-scrollbar bg-white shadow-sm border-b sticky top-[72px] z-10" id="day-tabs-container">
            <!-- JS 動態生成 tabs -->
        </div>

        <!-- Summary Bar -->
        <div class="mx-4 mt-3 p-3 bg-white rounded-2xl shadow-sm border summary-bar">
            <div class="flex justify-between items-center">
                <div class="text-center">
                    <div class="text-xs text-gray-500">今日總計</div>
                    <div id="day-total" class="font-bold text-xl text-red-500 tabular-nums">- ¥0</div>
                    <div id="day-total-mop" class="text-xs text-gray-500 tabular-nums"></div>
                </div>
                <div class="h-8 w-px bg-gray-200"></div>
                <div class="text-center">
                    <div class="text-xs text-gray-500">全程總計</div>
                    <div id="grand-total" class="font-bold text-xl text-gray-700 tabular-nums">- ¥0</div>
                    <div id="grand-total-mop" class="text-xs text-gray-500 tabular-nums"></div>
                </div>
            </div>
            <div class="text-center mt-1.5">
                <div class="text-[10px] text-gray-400">匯率：<span id="exchange-rate-display">1 ¥ = 0.057 MOP</span> <span class="cursor-pointer text-blue-500" onclick="openSettingsModal()">(更改)</span></div>
            </div>
        </div>

        <!-- Expense List -->
        <main class="p-4 space-y-1 min-h-[380px]" id="expense-list">
            <!-- JS 動態插入 -->
        </main>

        <!-- Floating Add Button -->
        <button onclick="openModal()" 
                class="fixed bottom-6 right-6 lg:right-[calc(50%-12rem)] w-14 h-14 bg-blue-600 text-white rounded-full shadow-lg text-3xl flex items-center justify-center hover:bg-blue-700 active:scale-95 transition z-20">
            +
        </button>

    </div>

    <!-- Add Expense Modal -->
    <div id="add-modal" class="fixed inset-0 bg-black bg-opacity-50 hidden z-50 flex justify-center items-end sm:items-center">
        <div class="bg-white w-full max-w-md sm:rounded-2xl rounded-t-2xl p-5 transform transition-transform duration-300">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-xl font-bold text-gray-800">新增消費</h2>
                <button onclick="closeModal()" class="text-gray-400 hover:text-gray-600 text-3xl leading-none">&times;</button>
            </div>

            <div class="mb-4">
                <label class="block text-sm font-semibold text-gray-700 mb-1.5">📸 上傳收據自動識別 (模擬)</label>
                <div class="border-2 border-dashed border-gray-300 rounded-xl p-5 text-center cursor-pointer hover:bg-blue-50 active:bg-blue-100 transition"
                     onclick="document.getElementById('receipt-upload').click()">
                    <input type="file" id="receipt-upload" accept="image/*" class="hidden" onchange="handleReceiptUpload(event)">
                    <div id="ocr-status" class="text-gray-500 text-sm">
                        點擊上傳收據照片<br>
                        <span class="text-xs text-gray-400">(純前端模擬識別)</span>
                    </div>
                </div>
            </div>

            <form id="expense-form" class="space-y-3" onsubmit="return false;">
                <div class="flex gap-3">
                    <div class="flex-1">
                        <label class="block text-sm font-medium text-gray-600 mb-1">店舖 / 項目名稱</label>
                        <input type="text" id="merchant" class="w-full border border-gray-300 rounded-lg p-2.5 text-sm focus:ring-2 focus:ring-blue-500 focus:border-blue-500" placeholder="e.g. 松屋牛丼" required>
                    </div>
                    <div class="w-28">
                        <label class="block text-sm font-medium text-gray-600 mb-1">金額 (¥)</label>
                        <input type="number" id="amount" class="w-full border border-gray-300 rounded-lg p-2.5 text-sm focus:ring-2 focus:ring-blue-500 focus:border-blue-500" placeholder="0" required>
                    </div>
                </div>

                <div class="flex gap-3">
                    <div class="flex-1">
                        <label class="block text-sm font-medium text-gray-600 mb-1">分類</label>
                        <select id="category" class="w-full border border-gray-300 rounded-lg p-2.5 text-sm focus:ring-2 focus:ring-blue-500">
                            <option value="飲食">🍔 飲食</option>
                            <option value="交通">🚆 交通</option>
                            <option value="住宿">🏨 住宿</option>
                            <option value="購物">🛍️ 購物</option>
                        </select>
                    </div>
                    <div class="flex-1">
                        <label class="block text-sm font-medium text-gray-600 mb-1">付款方式</label>
                        <select id="payment" class="w-full border border-gray-300 rounded-lg p-2.5 text-sm focus:ring-2 focus:ring-blue-500">
                            <option value="現金 (個人)">💵 現金 (個人)</option>
                            <option value="信用卡 (個人)">💳 信用卡 (個人)</option>
                            <option value="現金 (公費)">💰 現金 (公費)</option>
                            <option value="信用卡 (公費)">💳 信用卡 (公費)</option>
                        </select>
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-600 mb-1">備註 / 筆記（選填）</label>
                    <textarea id="note" rows="2" class="w-full border border-gray-300 rounded-lg p-2.5 text-sm focus:ring-2 focus:ring-blue-500 focus:border-blue-500 resize-y" placeholder="例如：和朋友一齊食 / 公費報銷用"></textarea>
                </div>

                <button type="button" onclick="saveExpense()" class="w-full bg-blue-600 hover:bg-blue-700 active:bg-blue-800 text-white font-bold py-3.5 rounded-xl mt-2 text-base transition">
                    儲存這筆消費
                </button>
                <p class="text-center text-xs text-gray-400 mt-1">資料會自動儲存在你的瀏覽器</p>
            </form>
        </div>
    </div>

    <!-- Statistics Modal -->
    <div id="stats-modal" class="fixed inset-0 bg-black bg-opacity-50 hidden z-50 flex justify-center items-end sm:items-center">
        <div class="bg-white w-full max-w-md sm:rounded-2xl rounded-t-2xl p-5 max-h-[85vh] overflow-auto">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-xl font-bold text-gray-800">📊 消費統計</h2>
                <button onclick="closeStatsModal()" class="text-gray-400 hover:text-gray-600 text-3xl leading-none">&times;</button>
            </div>

            <!-- 切換 全程 / 本日 -->
            <div class="flex bg-gray-100 rounded-xl p-1 mb-4">
                <button id="stats-all-btn" onclick="switchStatsMode('all')" 
                        class="flex-1 py-2 text-sm font-medium rounded-lg bg-white shadow">全程統計</button>
                <button id="stats-day-btn" onclick="switchStatsMode('day')" 
                        class="flex-1 py-2 text-sm font-medium rounded-lg text-gray-600">本日統計</button>
            </div>

            <!-- 圓餅圖 -->
            <div class="bg-white rounded-2xl p-4 border mb-4">
                <canvas id="category-chart" width="300" height="300"></canvas>
            </div>

            <!-- 分類明細 -->
            <div class="bg-white rounded-2xl border overflow-hidden">
                <div class="px-4 py-2 bg-gray-50 text-xs font-semibold text-gray-500 flex justify-between">
                    <span>分類</span>
                    <span>金額 (¥ / MOP)</span>
                </div>
                <div id="category-breakdown"></div>
            </div>

            <div class="mt-4 text-center text-xs text-gray-400">
                匯率：<span id="stats-exchange-rate">1 ¥ = 0.057 MOP</span>
            </div>
        </div>
    </div>

    <!-- Settings Modal -->
    <div id="settings-modal" class="fixed inset-0 bg-black bg-opacity-50 hidden z-50 flex justify-center items-end sm:items-center">
        <div class="bg-white w-full max-w-md sm:rounded-2xl rounded-t-2xl p-5">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-xl font-bold text-gray-800">⚙️ 設定</h2>
                <button onclick="closeSettingsModal()" class="text-gray-400 hover:text-gray-600 text-3xl leading-none">&times;</button>
            </div>

            <div class="space-y-4">
                <!-- 匯率設定 -->
                <div>
                    <label class="block text-sm font-medium text-gray-600 mb-1">JPY → MOP 匯率</label>
                    <div class="flex gap-2">
                        <input type="number" id="exchange-rate-input" step="0.0001" class="flex-1 border border-gray-300 rounded-lg p-2.5 text-sm focus:ring-2 focus:ring-blue-500" value="0.057">
                        <button onclick="saveExchangeRate()" class="px-5 bg-blue-600 text-white rounded-lg text-sm font-medium">儲存</button>
                    </div>
                    <p class="text-xs text-gray-400 mt-1">例如：1日圓 = 0.057澳門幣</p>
                </div>

                <div class="border-t pt-4">
                    <button onclick="addNewDay()" 
                            class="w-full flex items-center justify-center gap-x-2 py-3 border border-dashed border-gray-300 hover:border-blue-400 rounded-xl text-sm font-medium text-gray-600 hover:text-blue-600 transition">
                        <span class="text-lg">+</span> 新增一日（Day 4 / Day 5...）
                    </button>
                </div>

                <div class="pt-2">
                    <button onclick="clearAllData()" 
                            class="w-full py-3 text-sm font-medium text-red-500 hover:bg-red-50 rounded-xl border border-red-200 transition">
                        🗑️ 清除所有記錄（不可恢復）
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ==================== 全域變數 ====================
        let currentDay = 'day1';
        let expensesDB = {};
        let tripDays = [];           // 動態日數
        let exchangeRate = 0.057;    // 預設 JPY → MOP
        let currentStatsChart = null;
        let statsMode = 'all';

        const modal = document.getElementById('add-modal');
        const statsModal = document.getElementById('stats-modal');
        const settingsModal = document.getElementById('settings-modal');
        const expenseList = document.getElementById('expense-list');

        function getCategoryColor(category) {
            switch(category) {
                case '飲食': return '#f59e0b';
                case '交通': return '#3b82f6';
                case '住宿': return '#8b5cf6';
                case '購物': return '#10b981';
                default: return '#64748b';
            }
        }

        function getPaymentIcon(payment) {
            return payment.includes('現金') ? '💵' : '💳';
        }

        function formatMOP(amount) {
            return (amount * exchangeRate).toFixed(2);
        }

        // ==================== LocalStorage ====================
        function loadData() {
            const savedExpenses = localStorage.getItem('kansai2026_expenses_v3');
            const savedDays = localStorage.getItem('kansai2026_tripdays_v3');
            const savedRate = localStorage.getItem('kansai2026_exchangerate_v3');

            if (savedRate) exchangeRate = parseFloat(savedRate);

            if (savedDays) {
                tripDays = JSON.parse(savedDays);
            } else {
                tripDays = [
                    { key: 'day1', label: 'Day 1\n大阪難波' },
                    { key: 'day2', label: 'Day 2\n京都清水寺' },
                    { key: 'day3', label: 'Day 3\n宇治' },
                    { key: 'day4', label: 'Day 4\n自由行動' },
                    { key: 'day5', label: 'Day 5\n大阪出發' }
                ];
            }

            if (savedExpenses) {
                expensesDB = JSON.parse(savedExpenses);
            } else {
                const now = Date.now();
                expensesDB = {
                    day1: [
                        { id: now-100000, merchant: '南海電鐵車票', amount: 2300, category: '交通', payment: '信用卡 (公費)', note: '從關西機場到難波', timestamp: new Date(now-100000).toISOString() },
                        { id: now-50000,  merchant: '章魚燒 (たこ焼き)', amount: 600, category: '飲食', payment: '現金 (個人)', note: '', timestamp: new Date(now-50000).toISOString() }
                    ],
                    day2: [], day3: [], day4: [], day5: []
                };
                saveData();
            }
        }

        function saveData() {
            localStorage.setItem('kansai2026_expenses_v3', JSON.stringify(expensesDB));
            localStorage.setItem('kansai2026_tripdays_v3', JSON.stringify(tripDays));
            localStorage.setItem('kansai2026_exchangerate_v3', exchangeRate.toString());
        }

        // ==================== 渲染 Tabs ====================
        function renderTabs() {
            const container = document.getElementById('day-tabs-container');
            container.innerHTML = '';
            tripDays.forEach(day => {
                const btn = document.createElement('button');
                btn.className = `day-tab px-5 py-3 text-sm font-semibold flex-shrink-0 text-center border-b-2 ${currentDay === day.key ? 'text-blue-600 border-blue-600' : 'text-gray-500 border-transparent hover:text-blue-600'}`;
                btn.innerHTML = day.label.replace('\n', '<br>');
                btn.onclick = () => switchDay(day.key);
                container.appendChild(btn);
            });
        }

        function switchDay(newDayKey) {
            currentDay = newDayKey;
            renderTabs();
            renderExpenses();
        }

        function addNewDay() {
            const nextNum = tripDays.length + 1;
            const newKey = `day${nextNum}`;
            tripDays.push({ key: newKey, label: `Day ${nextNum}\n自訂` });
            expensesDB[newKey] = [];
            saveData();
            renderTabs();
            switchDay(newKey);
            closeSettingsModal();
        }

        // ==================== 總額計算（含 MOP） ====================
        function updateTotals() {
            const dayList = expensesDB[currentDay] || [];
            const dayTotal = dayList.reduce((sum, e) => sum + (e.amount || 0), 0);
            
            document.getElementById('day-total').textContent = `- ¥${dayTotal.toLocaleString()}`;
            document.getElementById('day-total-mop').textContent = `≈ MOP ${formatMOP(dayTotal)}`;

            let grandTotal = 0;
            Object.keys(expensesDB).forEach(key => {
                const list = expensesDB[key];
                if (Array.isArray(list)) grandTotal += list.reduce((s, e) => s + (e.amount || 0), 0);
            });
            
            document.getElementById('grand-total').textContent = `- ¥${grandTotal.toLocaleString()}`;
            document.getElementById('grand-total-mop').textContent = `≈ MOP ${formatMOP(grandTotal)}`;
            document.getElementById('exchange-rate-display').textContent = `1 ¥ = ${exchangeRate} MOP`;
        }

        // ==================== 渲染消費列表 ====================
        function renderExpenses() {
            expenseList.innerHTML = '';
            const list = expensesDB[currentDay] || [];

            if (list.length === 0) {
                const empty = document.createElement('div');
                empty.className = 'flex flex-col items-center justify-center py-12 text-gray-400';
                empty.innerHTML = `<div class="text-5xl mb-3">📭</div><p class="font-medium">今日仲未有消費記錄</p><p class="text-xs mt-1">按下面「+」新增</p>`;
                expenseList.appendChild(empty);
            } else {
                const sorted = [...list].sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp));
                sorted.forEach(exp => expenseList.appendChild(createExpenseCard(exp)));
            }
            updateTotals();
        }

        function createExpenseCard(exp) {
            const card = document.createElement('div');
            card.className = `expense-card bg-white p-3.5 rounded-2xl shadow-sm border mt-3 flex justify-between items-start`;
            card.style.borderLeft = `5px solid ${getCategoryColor(exp.category)}`;

            const timeStr = new Date(exp.timestamp).toLocaleTimeString('zh-HK', { hour: '2-digit', minute: '2-digit' });
            const mopAmount = formatMOP(exp.amount);
            const noteHTML = exp.note && exp.note.trim() ? `<div class="text-xs text-gray-500 italic mt-1.5 note-text">📝 ${exp.note}</div>` : '';

            card.innerHTML = `
                <div class="flex-1 min-w-0 pr-3">
                    <div class="font-bold text-gray-800 text-[15px] leading-tight">${exp.merchant}</div>
                    <div class="flex items-center gap-x-2 mt-1.5">
                        <span class="inline-flex items-center px-2 py-0.5 rounded-full text-xs font-medium" style="background-color:${getCategoryColor(exp.category)}20; color:${getCategoryColor(exp.category)}">${exp.category}</span>
                        <span class="text-xs text-gray-500 flex items-center gap-x-1">${getPaymentIcon(exp.payment)} ${exp.payment}</span>
                    </div>
                    ${noteHTML}
                    <div class="flex items-center gap-x-2 mt-1">
                        <span class="text-[10px] text-gray-400">${timeStr}</span>
                        <span class="text-[10px] text-emerald-600 font-medium">≈ MOP ${mopAmount}</span>
                    </div>
                </div>
                <div class="flex flex-col items-end justify-between">
                    <div class="font-bold text-red-500 text-lg tabular-nums whitespace-nowrap">- ¥${exp.amount.toLocaleString()}</div>
                    <button class="delete-btn mt-2 text-gray-300 hover:text-red-500 p-1 -mr-1" title="刪除">🗑️</button>
                </div>
            `;

            card.querySelector('.delete-btn').onclick = (e) => {
                e.stopImmediatePropagation();
                if (confirm(`確定刪除「${exp.merchant}」？`)) deleteExpense(exp.id);
            };
            return card;
        }

        function deleteExpense(id) {
            expensesDB[currentDay] = expensesDB[currentDay].filter(e => e.id !== id);
            saveData();
            renderExpenses();
        }

        // ==================== 新增消費 ====================
        function saveExpense() {
            const merchant = document.getElementById('merchant').value.trim();
            const amount = parseInt(document.getElementById('amount').value);
            const category = document.getElementById('category').value;
            const payment = document.getElementById('payment').value;
            const note = document.getElementById('note').value.trim();

            if (!merchant || !amount || amount <= 0) { alert('請填寫正確店名與金額'); return; }

            const newExp = { id: Date.now(), merchant, amount, category, payment, note, timestamp: new Date().toISOString() };
            if (!expensesDB[currentDay]) expensesDB[currentDay] = [];
            expensesDB[currentDay].push(newExp);
            saveData();
            closeModal();
            renderExpenses();
        }

        // ==================== OCR 模擬 ====================
        function handleReceiptUpload(e) {
            const file = e.target.files[0];
            if (!file) return;
            const status = document.getElementById('ocr-status');
            status.innerHTML = `⏳ 分析中...`;
            setTimeout(() => {
                const demos = [
                    {m:'松屋難波店', a:1250, n:'午餐'},
                    {m:'一蘭道頓堀', a:980, n:'宵夜'},
                    {m:'環球影城門票', a:8200, n:'公費'},
                    {m:'京都巴士一日券', a:600, n:''},
                    {m:'7-11 便利店', a:680, n:'水同零食'}
                ];
                const pick = demos[Math.floor(Math.random()*demos.length)];
                document.getElementById('merchant').value = pick.m;
                document.getElementById('amount').value = pick.a;
                if (pick.n) document.getElementById('note').value = pick.n;
                status.innerHTML = `✅ 已自動填入`;
                status.classList.add('text-green-600', 'font-bold');
                e.target.value = '';
            }, 1300);
        }

        // ==================== Modal 控制 ====================
        function openModal() {
            modal.classList.remove('hidden'); modal.classList.add('flex');
            document.getElementById('expense-form').reset();
            document.getElementById('ocr-status').innerHTML = `點擊上傳收據照片<br><span class="text-xs text-gray-400">(純前端模擬)</span>`;
        }
        function closeModal() { modal.classList.remove('flex'); modal.classList.add('hidden'); }

        // ==================== 統計 Modal ====================
        function openStatsModal() {
            statsModal.classList.remove('hidden'); statsModal.classList.add('flex');
            statsMode = 'all';
            document.getElementById('stats-all-btn').classList.add('bg-white', 'shadow');
            document.getElementById('stats-day-btn').classList.remove('bg-white', 'shadow');
            renderStatistics();
        }
        function closeStatsModal() {
            if (currentStatsChart) { currentStatsChart.destroy(); currentStatsChart = null; }
            statsModal.classList.remove('flex'); statsModal.classList.add('hidden');
        }

        function switchStatsMode(mode) {
            statsMode = mode;
            const allBtn = document.getElementById('stats-all-btn');
            const dayBtn = document.getElementById('stats-day-btn');
            if (mode === 'all') {
                allBtn.classList.add('bg-white', 'shadow');
                dayBtn.classList.remove('bg-white', 'shadow');
            } else {
                allBtn.classList.remove('bg-white', 'shadow');
                dayBtn.classList.add('bg-white', 'shadow');
            }
            renderStatistics();
        }

        function renderStatistics() {
            const breakdownDiv = document.getElementById('category-breakdown');
            breakdownDiv.innerHTML = '';
            if (currentStatsChart) currentStatsChart.destroy();

            let dataSource = {};
            if (statsMode === 'all') {
                Object.keys(expensesDB).forEach(key => {
                    (expensesDB[key] || []).forEach(exp => {
                        dataSource[exp.category] = (dataSource[exp.category] || 0) + exp.amount;
                    });
                });
            } else {
                (expensesDB[currentDay] || []).forEach(exp => {
                    dataSource[exp.category] = (dataSource[exp.category] || 0) + exp.amount;
                });
            }

            const categories = ['飲食', '交通', '住宿', '購物'];
            const amounts = categories.map(c => dataSource[c] || 0);
            const total = amounts.reduce((a,b) => a+b, 0);

            // 圓餅圖
            const ctx = document.getElementById('category-chart');
            currentStatsChart = new Chart(ctx, {
                type: 'pie',
                data: {
                    labels: categories,
                    datasets: [{
                        data: amounts,
                        backgroundColor: ['#f59e0b', '#3b82f6', '#8b5cf6', '#10b981'],
                        borderWidth: 2,
                        borderColor: '#fff'
                    }]
                },
                options: {
                    responsive: true,
                    plugins: {
                        legend: { position: 'bottom', labels: { padding: 15, font: { size: 13 } } },
                        tooltip: { callbacks: { label: (ctx) => `${ctx.label}: ¥${ctx.raw.toLocaleString()} (${((ctx.raw/total)*100 || 0).toFixed(1)}%)` } }
                    }
                }
            });

            // 明細列表
            categories.forEach((cat, i) => {
                const amt = amounts[i];
                if (amt === 0) return;
                const pct = total > 0 ? ((amt / total) * 100).toFixed(1) : 0;
                const row = document.createElement('div');
                row.className = `stat-row px-4 py-3 flex justify-between items-center border-t text-sm`;
                row.innerHTML = `
                    <div class="flex items-center gap-x-2">
                        <span style="color:${getCategoryColor(cat)}">●</span>
                        <span class="font-medium">${cat}</span>
                    </div>
                    <div class="text-right">
                        <div class="font-semibold tabular-nums">¥${amt.toLocaleString()}</div>
                        <div class="text-xs text-gray-500">≈ MOP ${formatMOP(amt)} <span class="text-gray-400">(${pct}%)</span></div>
                    </div>
                `;
                breakdownDiv.appendChild(row);
            });

            if (total === 0) {
                breakdownDiv.innerHTML = `<div class="px-4 py-6 text-center text-gray-400 text-sm">暫時冇消費記錄</div>`;
            }
            document.getElementById('stats-exchange-rate').textContent = `1 ¥ = ${exchangeRate} MOP`;
        }

        // ==================== 設定 Modal ====================
        function openSettingsModal() {
            settingsModal.classList.remove('hidden'); settingsModal.classList.add('flex');
            document.getElementById('exchange-rate-input').value = exchangeRate;
        }
        function closeSettingsModal() {
            settingsModal.classList.remove('flex'); settingsModal.classList.add('hidden');
        }

        function saveExchangeRate() {
            const val = parseFloat(document.getElementById('exchange-rate-input').value);
            if (val > 0 && val < 1) {
                exchangeRate = val;
                saveData();
                closeSettingsModal();
                updateTotals();
                if (!statsModal.classList.contains('hidden')) renderStatistics();
            } else {
                alert('請輸入合理匯率（例如 0.057）');
            }
        }

        function clearAllData() {
            if (confirm('確定要清除所有記錄嗎？此操作不可恢復！')) {
                localStorage.removeItem('kansai2026_expenses_v3');
                localStorage.removeItem('kansai2026_tripdays_v3');
                location.reload();
            }
        }

        // ==================== 初始化 ====================
        function init() {
            loadData();
            renderTabs();
            renderExpenses();

            [modal, statsModal, settingsModal].forEach(m => {
                m.addEventListener('click', e => { if (e.target === m) { m.classList.add('hidden'); m.classList.remove('flex'); } });
            });

            document.addEventListener('keydown', e => {
                if (e.key === 'Escape') {
                    if (!modal.classList.contains('hidden')) closeModal();
                    else if (!statsModal.classList.contains('hidden')) closeStatsModal();
                    else if (!settingsModal.classList.contains('hidden')) closeSettingsModal();
                }
            });

            console.log('%c[關西記帳本 v3] 多日 + 統計圖表 + JPY→MOP 已載入', 'color:#64748b');
        }

        window.onload = init;
    </script>
</body>
</html>
